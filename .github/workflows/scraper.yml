name: HF Hub Scraper

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit data/hub_stats.json

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — no extra secrets needed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run HF Hub scraper
        run: python scraper/hf_scraper.py

      - name: Commit & push updated data
        run: |
          git config user.name  "HF Hub Scraper [bot]"
          git config user.email "scraper@github-actions.invalid"
          git add data/hub_stats.json
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to data/hub_stats.json — skipping commit."
          else
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            git commit -m "data: HF Hub scrape ${TIMESTAMP}"
            git push origin HEAD:main
          fi
